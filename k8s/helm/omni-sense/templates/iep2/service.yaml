apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.iep2.name }}
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.iep2.name "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "omni-sense.selectorLabels" (dict "component" .Values.iep2.name "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.iep2.port }}
      targetPort: http
      protocol: TCP
