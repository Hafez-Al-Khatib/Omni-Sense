{{- if and .Values.timescaledb.persistence.enabled (not .Values.timescaledb.persistence.storageClass) }}
# This PVC is only rendered when persistence is enabled without a storageClass.
# StatefulSet volumeClaimTemplates handle dynamic provisioning when storageClass is set.
# ── Standalone PVC for environments with a default storage class ──────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-data
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.timescaledb.name "context" .) | nindent 4 }}
  annotations:
    # Retain the PVC even if the StatefulSet is deleted — protects against accidental data loss
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.timescaledb.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.timescaledb.persistence.size }}
{{- end }}
