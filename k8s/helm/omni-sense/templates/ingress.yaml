{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni-sense-ingress
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    # EEP REST API Gateway — used by field apps and external integrations
    - host: eep.{{ .Values.domain }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.eep.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.eep.name }}
                port:
                  name: http
    # Live API — real-time inference & ticketing
    - host: api.{{ .Values.domain }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.liveApi.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.liveApi.name }}
                port:
                  name: http
    # Ops Console (Streamlit) — internal operators
    - host: console.{{ .Values.domain }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.console.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.omniPlatform.name }}
                port:
                  name: http
{{- end }}
