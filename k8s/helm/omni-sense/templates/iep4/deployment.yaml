apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.iep4.name }}
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.iep4.name "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.iep4.replicas }}
  selector:
    matchLabels:
      {{- include "omni-sense.selectorLabels" (dict "component" .Values.iep4.name "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omni-sense.componentLabels" (dict "component" .Values.iep4.name "context" .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Values.iep4.name }}
          image: {{ include "omni-sense.image" (dict "repository" .Values.iep4.image.repository "context" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.iep4.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: omni-sense-config
          readinessProbe:
            httpGet:
              path: {{ .Values.iep4.readinessProbe.path }}
              port: {{ .Values.iep4.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.iep4.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.iep4.readinessProbe.periodSeconds }}
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.iep4.livenessProbe.path }}
              port: {{ .Values.iep4.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.iep4.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.iep4.livenessProbe.periodSeconds }}
            failureThreshold: 5
          resources:
            {{- toYaml .Values.iep4.resources | nindent 12 }}
          volumeMounts:
            - name: iep4-models
              mountPath: /app/models
      volumes:
        - name: iep4-models
          persistentVolumeClaim:
            claimName: iep4-models-pvc
      restartPolicy: Always
