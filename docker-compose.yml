services:
  # ── External Endpoint (API Gateway) ─────────────────────
  eep:
    build:
      context: ./eep
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OMNI_IEP2_URL=http://iep2:8002
      - OMNI_IEP3_URL=http://iep3:8003
      - OMNI_IEP4_URL=http://iep4:8004
      - OMNI_RATE_LIMIT=${OMNI_RATE_LIMIT:-5/minute}
    depends_on:
      iep2:
        condition: service_healthy
      iep3:
        condition: service_healthy
      iep4:
        condition: service_healthy
    networks:
      - omni-net
    restart: unless-stopped

  # ── Internal Endpoint 2 (Diagnostic Engine) ─────────────
  iep2:
    build:
      context: .
      dockerfile: iep2/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./iep2/models:/app/models:rw
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - omni-net
    restart: unless-stopped
    depends_on:
      mqtt-broker:
        condition: service_started

  # ── Internal Endpoint 4 (CNN Deep Classifier) ───────────
  iep4:
    build:
      context: .
      dockerfile: iep4/Dockerfile
    ports:
      - "8004:8004"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')" ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    volumes:
      - iep4-models:/app/models
      - ./iep2/models/autoencoder_ood.pt:/app/models/autoencoder_ood.pt:ro
      - ./iep2/models/autoencoder_threshold.npy:/app/models/autoencoder_threshold.npy:ro
    networks:
      - omni-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Prometheus (Metrics Collection) ─────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - omni-net
    restart: unless-stopped

  # ── Alertmanager (Alert Routing) ────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--log.level=info"
    networks:
      - omni-net
    restart: unless-stopped

  # ── Grafana (Dashboards) ────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards-json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - alertmanager
    networks:
      - omni-net
    restart: unless-stopped

  # ── Internal Endpoint 3 (Dispatch & Active Learning) ────
  iep3:
    build:
      context: .
      dockerfile: iep3/Dockerfile
    ports:
      - "8003:8003"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - iep3-tickets:/app/tickets
    networks:
      - omni-net
    restart: unless-stopped

  # ── MLflow (Model Tracking & Registry) ──────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - mlflow-db:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000
    networks:
      - omni-net
    restart: unless-stopped

  # ── Jaeger (Distributed Tracing) ────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - omni-net
    restart: unless-stopped

  # ── MQTT Broker (plain TCP for demo stability) ──────────
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./omni/configs:/mosquitto/config:rw
      - mqtt-data:/mosquitto/data
    networks:
      - omni-net
    restart: unless-stopped

  # ── Platform v2 (Streamlit Ops Console) ─────────────────
  omni-platform:
    build:
      context: .
      dockerfile: omni/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - OMNI_MQTT_HOST=mqtt-broker
      - OMNI_MQTT_PORT=1883
      - OMNI_MQTT_CA=/app/certs/ca.crt
      - OMNI_MQTT_CERT=/app/certs/gateway.crt
      - OMNI_MQTT_KEY=/app/certs/gateway.key
      - OMNI_MQTT_USER=gateway
      - OMNI_USE_STUB_GATEWAY=false
      - TIMESCALE_DSN=postgresql://${POSTGRES_USER:-omni}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@timescaledb:5432/${POSTGRES_DB:-omnisense}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./certs:/app/certs:ro
      - ./iep2/models:/app/iep2/models:ro
      - ./iep3:/app/iep3
      - ./data:/app/data:ro
      - omni-data:/app/platform_data
    depends_on:
      mqtt-broker:
        condition: service_started
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omni-net
    restart: unless-stopped
    command: >
      sh -c "streamlit run omni/ops_console/app.py
             --server.port=8501
             --server.address=0.0.0.0
             --server.headless=true"

  # ── TimescaleDB ─────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-omnisense}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./omni/common/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni -d omnisense"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omni-net
    restart: unless-stopped

  # ── Redis (cache + event bus) ───────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - omni-net
    restart: unless-stopped

networks:
  omni-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  iep3-tickets:
  iep4-models:
  mqtt-data:
  omni-data:
  timescale-data:
  redis-data:
  mlflow-db:
