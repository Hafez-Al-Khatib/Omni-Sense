apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mqtt.name }}
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.mqtt.name "context" .) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "omni-sense.selectorLabels" (dict "component" .Values.mqtt.name "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omni-sense.componentLabels" (dict "component" .Values.mqtt.name "context" .) | nindent 8 }}
      annotations:
        checksum/mqtt-config: {{ include (print $.Template.BasePath "/mqtt/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsUser: 1883
        fsGroup: 1883
      containers:
        - name: mosquitto
          image: {{ .Values.mqtt.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mqtts
              containerPort: {{ .Values.mqtt.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mqtt.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mqtt.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
          resources:
            {{- toYaml .Values.mqtt.resources | nindent 12 }}
          volumeMounts:
            - name: mosquitto-config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            - name: mosquitto-config
              mountPath: /mosquitto/config/acl
              subPath: mqtt_acl
            - name: mqtt-tls
              mountPath: /mosquitto/certs
              readOnly: true
            - name: mqtt-data
              mountPath: /mosquitto/data
      volumes:
        - name: mosquitto-config
          configMap:
            name: mosquitto-config
        - name: mqtt-tls
          secret:
            secretName: mqtt-tls
            optional: true
        - name: mqtt-data
          emptyDir: {}
