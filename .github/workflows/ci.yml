name: CI Pipeline

on:
  push:
    branches:
      - maram

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests httpx pytest-asyncio numpy soundfile

      - name: Run pytest
        run: |
          pytest tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build EEP Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/omni-sense-eep:${{ github.sha }} ./eep
          docker tag ${{ secrets.DOCKER_USERNAME }}/omni-sense-eep:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/omni-sense-eep:ci-latest

      - name: Push EEP Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/omni-sense-eep:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/omni-sense-eep:ci-latest