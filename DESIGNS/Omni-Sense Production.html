<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Omni-Sense — Production Console</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="styles-light.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screen-ops.jsx"></script>
<script type="text/babel" src="screen-diagnose.jsx"></script>
<script type="text/babel" src="screen-diagnosis.jsx"></script>
<script type="text/babel" src="screen-tdoa.jsx"></script>
<script type="text/babel" src="screen-field.jsx"></script>
<script type="text/babel" src="screen-mlops.jsx"></script>
<script type="text/babel" src="screen-sensor.jsx"></script>
<script type="text/babel" src="screen-breakai.jsx"></script>

<style>
  body { background: #cfe6f8; }
  body.theme-light[data-accent="amber"]  { --signal: #e07b2a; --signal-soft: rgba(224,123,42,.14); }
  body.theme-light[data-accent="green"]  { --signal: #0fa36b; --signal-soft: rgba(15,163,107,.14); }
  body.theme-light[data-accent="violet"] { --signal: #7c3aed; --signal-soft: rgba(124,58,237,.14); }

  /* App shell */
  .app-shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  .nav-rail {
    display: flex; flex-direction: column;
    padding: 18px 0;
    overflow-y: auto;
  }
  .nav-brand {
    padding: 0 18px 18px;
    border-bottom: 1px solid rgba(91,184,245,0.4);
    margin-bottom: 14px;
  }
  .nav-brand-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem; font-weight: 800;
    letter-spacing: 4px; line-height: 1;
    background: linear-gradient(130deg, #0e75c8 0%, #1a8fe3 50%, #0fa36b 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-brand-sub {
    font-family: 'Rajdhani', sans-serif;
    color: #3a7ab0;
    font-size: 0.7rem;
    letter-spacing: 2px;
    margin-top: 4px;
  }
  .nav-section-label {
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    color: #6c9bc4;
    font-size: 0.62rem; letter-spacing: 2px;
    padding: 10px 18px 6px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.14s ease;
    font-size: 13px;
    letter-spacing: 0.06em;
  }
  .nav-item-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: inherit;
    opacity: 0.55;
    width: 18px;
  }
  .nav-status-row {
    margin-top: auto;
    padding: 12px 18px 4px;
    border-top: 1px solid rgba(91,184,245,0.4);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    color: #3a7ab0;
    letter-spacing: 1px;
  }

  /* Topbar */
  .topbar {
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .topbar-screen-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: #3a7ab0; letter-spacing: 2px;
  }
  .topbar-screen-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 3px;
    color: #0e75c8;
  }
  .topbar-screen-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; color: #3a7ab0; letter-spacing: 1px;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 14px;
    font-family: 'Rajdhani', sans-serif; font-size: 12px;
    color: #3a7ab0;
  }
  .live-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(15,163,107,0.14);
    border: 1px solid rgba(15,163,107,0.4);
    padding: 4px 12px;
    border-radius: 999px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    color: #0a7e51; font-size: 11px; letter-spacing: 1.5px;
  }
  .live-pill .dot-online {
    width: 7px; height: 7px; border-radius: 50%; background: #0fa36b;
    animation: bdotPulse 1.5s ease-in-out infinite;
  }

  /* Main content area */
  .screen-container {
    flex: 1;
    overflow: hidden;
    background: #cfe6f8;
    position: relative;
    display: flex; flex-direction: column;
  }
  .screen-stage {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .screen-stage > * {
    position: absolute; inset: 0;
  }

  /* Force-dark sections override the page background too */
  .screen-stage.is-dark { background: oklch(0.10 0.01 240); }

  /* Field crew screen needs centering */
  .field-wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: oklch(0.10 0.012 240);
  }

  /* Most screens want internal scroll; ops console manages its own layout */
  .os-art { overflow: auto; }
  .os-art.os-fixed { overflow: hidden !important; }
</style>
</head>
<body class="theme-light" data-screen-label="Omni-Sense Production Console">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "cyan",
  "density": "comfortable",
  "showGrid": true
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'ops',       num: '01', title: 'OPERATIONS', sub: 'Beirut zones · alert queue · KPIs',           Comp: () => <OpsConsole />,    section: 'live', dark: false },
  { id: 'diagnose',  num: '02', title: 'DIAGNOSE',   sub: 'Upload WAV · 5-head ensemble · verdict',      Comp: () => <DiagnoseScreen />,section: 'live', dark: false },
  { id: 'live',      num: '03', title: 'LIVE DIAGNOSIS', sub: 'WO-26041 · SHAP · OOD gate',              Comp: () => <LiveDiagnosis />, section: 'live', dark: false },
  { id: 'tdoa',      num: '04', title: 'TDOA FUSION', sub: 'Multi-sensor triangulation · ±meter ellipse', Comp: () => <TdoaFusion />,    section: 'live', dark: false },
  { id: 'field',     num: '05', title: 'FIELD CREW', sub: 'iOS · technician confirms · active learning', Comp: () => <div className="field-wrap"><FieldCrewApp /></div>, section: 'live', dark: true },
  { id: 'sensor',    num: '06', title: 'EDGE DEVICE',sub: 'S-HAMRA-001 · firmware · mTLS · power',       Comp: () => <SensorDetail />,  section: 'system', dark: false },
  { id: 'mlops',     num: '07', title: 'MLOPS HEALTH', sub: 'Drift · OOD · regression gate · Merkle',    Comp: () => <MlopsHealth />,   section: 'system', dark: true },
  { id: 'breakai',   num: '08', title: 'BREAK·MY·AI', sub: 'Live HIL · spoof attempts · OOD refusal',    Comp: () => <BreakMyAi />,     section: 'demo',   dark: true },
];

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = React.useState('diagnose');

  React.useEffect(() => {
    document.body.dataset.accent = tweaks.accent;
    document.body.dataset.density = tweaks.density;
  }, [tweaks.accent, tweaks.density]);

  // Keyboard nav
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const idx = SCREENS.findIndex(s => s.id === active);
      if (e.key === 'ArrowDown' || e.key === 'j') {
        e.preventDefault(); setActive(SCREENS[Math.min(SCREENS.length - 1, idx + 1)].id);
      } else if (e.key === 'ArrowUp' || e.key === 'k') {
        e.preventDefault(); setActive(SCREENS[Math.max(0, idx - 1)].id);
      } else if (e.key >= '1' && e.key <= '8') {
        const i = parseInt(e.key, 10) - 1;
        if (SCREENS[i]) setActive(SCREENS[i].id);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [active]);

  const screen = SCREENS.find(s => s.id === active) || SCREENS[0];
  const sections = [
    { key: 'live',   label: 'LIVE OPERATIONS' },
    { key: 'system', label: 'SYSTEM HEALTH' },
    { key: 'demo',   label: 'DEMO' },
  ];

  return (
    <React.Fragment>
      <div className="app-shell">
        {/* NAV RAIL */}
        <aside className="nav-rail">
          <div className="nav-brand">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <BrandOrb />
              <div>
                <div className="nav-brand-title">OMNI-SENSE</div>
                <div className="nav-brand-sub">ACOUSTIC INTEL</div>
              </div>
            </div>
          </div>

          {sections.map(sec => (
            <React.Fragment key={sec.key}>
              <div className="nav-section-label">{sec.label}</div>
              {SCREENS.filter(s => s.section === sec.key).map(s => (
                <div
                  key={s.id}
                  className={`nav-item${active === s.id ? ' active' : ''}`}
                  onClick={() => setActive(s.id)}
                >
                  <span className="nav-item-num">{s.num}</span>
                  <span style={{ fontWeight: active === s.id ? 600 : 500 }}>{s.title}</span>
                </div>
              ))}
            </React.Fragment>
          ))}

          <div className="nav-status-row">
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: 50, background: '#0fa36b',
                             animation: 'bdotPulse 1.5s ease-in-out infinite' }}></span>
              <span style={{ fontWeight: 600, color: '#0a7e51' }}>EEP ONLINE</span>
            </div>
            <div style={{ fontSize: 10, opacity: 0.8 }}>47 / 52 sensors · p95 612 ms</div>
            <div style={{ fontSize: 10, opacity: 0.6, marginTop: 4 }}>↑↓ or 1-8 to navigate</div>
          </div>
        </aside>

        {/* MAIN */}
        <main className="screen-container">
          {/* Topbar */}
          <div className="topbar">
            <div className="topbar-left">
              <span className="topbar-screen-num">{screen.num} /</span>
              <span className="topbar-screen-title">{screen.title}</span>
              <span style={{ width: 1, height: 18, background: '#8ecbf3' }}></span>
              <span className="topbar-screen-sub">{screen.sub}</span>
            </div>
            <div className="topbar-right">
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11 }}>
                AUB · EECE503N/798N · SPRING 2026
              </span>
              <span className="live-pill">
                <span className="dot-online"></span>
                LIVE
              </span>
            </div>
          </div>

          {/* Screen stage */}
          <div className={`screen-stage${screen.dark ? ' is-dark' : ''}`}>
            <div className={screen.dark ? 'force-dark' : ''} style={{ width: '100%', height: '100%' }}>
              <screen.Comp />
            </div>
          </div>
        </main>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            label="Accent"
            value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              { value: 'cyan',   label: 'Cyan' },
              { value: 'green',  label: 'Green' },
              { value: 'amber',  label: 'Amber' },
              { value: 'violet', label: 'Violet' },
            ]}
          />
          <TweakRadio
            label="Density"
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'comfortable', label: 'Comfort' },
              { value: 'dense',       label: 'Dense' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Quick Nav">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 6 }}>
            {SCREENS.map(s => (
              <button key={s.id}
                onClick={() => setActive(s.id)}
                className="btn"
                style={{
                  fontSize: 10, padding: '6px 8px',
                  borderColor: active === s.id ? '#1a8fe3' : undefined,
                  background: active === s.id ? 'rgba(26,143,227,0.12)' : undefined,
                }}>
                {s.num} {s.title}
              </button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

const BrandOrb = () => (
  <div style={{
    width: 38, height: 38,
    borderRadius: '50%',
    border: '2px solid rgba(26,143,227,0.5)',
    background: 'rgba(255,255,255,0.5)',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    animation: 'logoGlow 3.5s ease-in-out infinite',
  }}>
    <svg width="22" height="22" viewBox="0 0 38 38" fill="none">
      <circle cx="19" cy="19" r="14" stroke="#1a8fe3" strokeWidth="1.5" strokeDasharray="5 2.5"/>
      <path d="M9 19 Q14 9,19 19 Q24 29,29 19" stroke="#1a8fe3" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
      <circle cx="19" cy="19" r="3.5" fill="#1a8fe3" opacity=".95"/>
    </svg>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
