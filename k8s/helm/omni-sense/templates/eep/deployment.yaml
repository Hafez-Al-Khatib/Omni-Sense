apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.eep.name }}
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.eep.name "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.eep.replicas }}
  selector:
    matchLabels:
      {{- include "omni-sense.selectorLabels" (dict "component" .Values.eep.name "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omni-sense.componentLabels" (dict "component" .Values.eep.name "context" .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Values.eep.name }}
          image: {{ include "omni-sense.image" (dict "repository" .Values.eep.image.repository "context" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.eep.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: omni-sense-config
          env:
            {{- range $key, $val := .Values.eep.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.eep.readinessProbe.path }}
              port: {{ .Values.eep.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.eep.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.eep.readinessProbe.periodSeconds }}
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.eep.livenessProbe.path }}
              port: {{ .Values.eep.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.eep.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.eep.livenessProbe.periodSeconds }}
            failureThreshold: 5
          resources:
            {{- toYaml .Values.eep.resources | nindent 12 }}
      restartPolicy: Always
