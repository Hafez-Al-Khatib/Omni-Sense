# ──────────────────────────────────────────────────────────────────────────────
# IMPORTANT: This template creates a placeholder Secret with empty values.
# You MUST populate credentials before deploying. Run:
#
#   kubectl -n {{ include "omni-sense.namespace" . }} create secret generic omni-sense-secret \
#     --from-literal=TWILIO_ACCOUNT_SID=ACxxxx \
#     --from-literal=TWILIO_AUTH_TOKEN=your_token \
#     --from-literal=TWILIO_FROM_NUMBER=+1XXXXXXXXXX \
#     --from-literal=TWILIO_CREW_NUMBERS='{"crew-alpha":"+9613XXXXXX"}' \
#     --from-literal=TIMESCALEDB_PASSWORD=strong_password \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or use an external secrets operator (e.g., External Secrets Operator with
# Vault/AWS Secrets Manager) by disabling this template and referencing your
# ExternalSecret.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: omni-sense-secret
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
  annotations:
    # Remind operators this Secret holds sensitive credentials
    omni-sense/secret-type: "credentials"
    omni-sense/requires-manual-population: "true"
type: Opaque
# Values are base64-encoded empty strings — REPLACE BEFORE GOING LIVE.
# To encode: echo -n 'value' | base64
data:
  # Twilio SMS / WhatsApp credentials
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""
  # JSON map of crew_id → E.164 phone number, e.g.:
  # {"crew-alpha":"+9613XXXXXX","crew-beta":"+9613YYYYYY"}
  TWILIO_CREW_NUMBERS: ""

  # TimescaleDB password
  TIMESCALEDB_PASSWORD: ""
