global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── EEP (API Gateway) ──
  - job_name: "eep"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["eep:8000"]
        labels:
          service: "eep"
          role: "gateway"

  # ── IEP1 (YAMNet Embedding Service) ──
  - job_name: "iep1"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["iep1:8001"]
        labels:
          service: "iep1"
          role: "feature_extraction"

  # ── IEP2 (Diagnostic Engine) ──
  - job_name: "iep2"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["iep2:8002"]
        labels:
          service: "iep2"
          role: "diagnostic"

  # ── IEP3 (Dispatch & Active Learning) ──
  - job_name: "iep3"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["iep3:8003"]
        labels:
          service: "iep3"
          role: "dispatch"

  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
