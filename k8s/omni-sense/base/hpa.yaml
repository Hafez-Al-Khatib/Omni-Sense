apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omni-sense-eep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omni-sense-eep
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60