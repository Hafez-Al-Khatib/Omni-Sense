version: "3.9"

services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    ports:
      - "8883:8883"
    volumes:
      - ./omni/configs:/mosquitto/config:rw
      - ./certs:/mosquitto/certs:rw
      - mqtt-data:/mosquitto/data
    networks:
      - omni-net
    restart: unless-stopped

  iep2:
    build:
      context: ./iep2
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - omni-net
    restart: unless-stopped
    depends_on:
      - mqtt-broker

  iep3:
    build:
      context: ./iep3
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - iep3-tickets:/app/tickets
    networks:
      - omni-net
    restart: unless-stopped

  iep4:
    build:
      context: ./iep4
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    volumes:
      - iep4-models:/app/models
    networks:
      - omni-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  eep:
    build:
      context: ./eep
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OMNI_IEP2_URL=http://iep2:8002
      - OMNI_IEP3_URL=http://iep3:8003
      - OMNI_IEP4_URL=http://iep4:8004
      - OMNI_RATE_LIMIT=5/minute
    depends_on:
      iep2:
        condition: service_healthy
      iep3:
        condition: service_healthy
      iep4:
        condition: service_healthy
    networks:
      - omni-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - omni-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards-json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - omni-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  iep3-tickets:
  iep4-models:
  mqtt-data:
  omni-data:

networks:
  omni-net:
    driver: bridge
