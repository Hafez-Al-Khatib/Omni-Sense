; PlatformIO configuration for Omni-Sense ESP32 Edge Node
; See: https://docs.platformio.org/en/latest/projectconf/index.html
;
; Flash:   pio run --target upload
; Monitor: pio device monitor --baud 115200
; OTA:     pio run --target upload --upload-port <ip_address>

[env:esp32dev]
platform         = espressif32 @ ^6.5.0
board            = esp32dev
framework        = arduino

; 4 MB flash with large app + OTA partition
board_build.partitions = huge_app.csv

; Serial monitor
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_IDF_TARGET_ESP32
    -DARDUINO_ARCH_ESP32
    ; Increase PubSubClient buffer size for large base64 payloads
    -DMQTT_MAX_PACKET_SIZE=65535

; Libraries
lib_deps =
    knolleary/PubSubClient @ ^2.8
    ; ArduinoOTA is bundled in the ESP32 Arduino core — no extra dep needed

; Upload settings (USB)
upload_speed     = 921600

; OTA upload (uncomment and set IP for wireless flash)
; upload_protocol  = espota
; upload_port      = 192.168.1.42
; upload_flags     = --port=3232

; Optional: verbose output
; build_type = debug

; ─── Second target: ESP32-S3 with on-device features + TFLite OOD gate ──────
;
; Build flags toggle the inference path:
;   OMNI_PUBLISH_FEATURES=1  → compute the 39-d DSP feature vector on-device
;                              (omni_features.cpp) and publish ~200 B JSON
;                              instead of ~8.5 KB raw PCM (~40x bandwidth
;                              reduction). When the embedded TFLite int8
;                              autoencoder is a real model (not a placeholder),
;                              additionally runs an OOD gate and drops frames
;                              that look like normal background noise.
;   OMNI_PUBLISH_FEATURES=0  → original raw-PCM publish path (default for the
;                              plain ESP32 target above for backwards compat).
[env:esp32s3]
platform         = espressif32 @ ^6.5.0
board            = esp32-s3-devkitc-1
framework        = arduino
board_build.partitions = huge_app.csv
; Enable PSRAM (QIO OPI) for S3 variants — required for large frame buffers
board_build.arduino.memory_type = qio_opi
monitor_speed    = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_IDF_TARGET_ESP32S3
    -DARDUINO_ARCH_ESP32
    -DBOARD_HAS_PSRAM
    -DMQTT_MAX_PACKET_SIZE=65535
    -DOMNI_PUBLISH_FEATURES=1
lib_deps =
    knolleary/PubSubClient @ ^2.8
    ; TFLite-Micro for the on-device autoencoder OOD gate. The library is
    ; OPTIONAL — omni_inference.cpp uses __has_include() so the firmware
    ; still builds without it, falling back to a "model unavailable" stub
    ; that just disables the OOD gate (features still get published).
    https://github.com/tensorflow/tflite-micro-arduino-examples.git
upload_speed     = 921600

; ─── CI / unit-test target (native) ──────────────────────────────────────────
[env:native]
platform  = native
build_src_filter = +<../test/>
test_framework   = unity
