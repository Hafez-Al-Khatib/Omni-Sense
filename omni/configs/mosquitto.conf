# ── Omni-Sense Mosquitto Configuration ──────────────────────────────────────
# Documentation: https://mosquitto.org/man/mosquitto-conf-5.html

# ── Listeners ────────────────────────────────────────────────────────────────
# 1883  = plain TCP for local lab / hardware demo (no TLS overhead)
# 8883  = mTLS for production ESP32 / RPi deployments
listener 1883
allow_anonymous true

listener 8883
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# Require clients to provide certificates (Mutual TLS)
require_certificate true
use_identity_as_username true
tls_version tlsv1.2

# ── Authentication & ACL ───────────────────────────────────────────────────
# Global default: anonymous allowed (local demo / CI on port 1883).
# Port 8883 overrides this with require_certificate + use_identity_as_username.
allow_anonymous true
# password_file /mosquitto/config/passwd
acl_file      /mosquitto/config/acl

# ── Persistence ────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
