name: CI — Lint, Test, Model Regression

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --output-format=github

  test-eep:
    name: Test EEP
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r eep/requirements.txt
          pip install pytest pytest-asyncio httpx
      - run: cd eep && python -m pytest tests/ -v --tb=short

  test-iep1:
    name: Test IEP1
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r iep1/requirements.txt
          pip install pytest pytest-asyncio
      - run: cd iep1 && python -m pytest tests/ -v --tb=short

  test-iep2:
    name: Test IEP2
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r iep2/requirements.txt
          pip install pytest pytest-asyncio
      - run: cd iep2 && python -m pytest tests/ -v --tb=short

  model-regression:
    name: Model Regression Gate
    runs-on: ubuntu-latest
    needs: [test-eep, test-iep1, test-iep2]
    if: |
      contains(github.event.pull_request.labels.*.name, 'model-update') ||
      contains(github.event.head_commit.message, '[model]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r iep2/requirements.txt
          pip install pytest pandas pyarrow
      - run: |
          cd iep2 && python -m pytest tests/test_model_regression.py -v --tb=short
        env:
          GOLDEN_DATASET_PATH: ../data/golden/golden_dataset_v1.csv

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-eep, test-iep1, test-iep2]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build EEP
        uses: docker/build-push-action@v5
        with:
          context: ./eep
          push: false
          tags: omni-sense/eep:latest

      - name: Build IEP1
        uses: docker/build-push-action@v5
        with:
          context: ./iep1
          push: false
          tags: omni-sense/iep1:latest

      - name: Build IEP2
        uses: docker/build-push-action@v5
        with:
          context: ./iep2
          push: false
          tags: omni-sense/iep2:latest
