apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.mqtt.name "context" .) | nindent 4 }}
data:
  mosquitto.conf: |
    # ── Omni-Sense Mosquitto configuration (Kubernetes) ──────────────────────
    # mTLS on port 8883 — no plaintext listener
    listener 8883
    protocol mqtt

    # TLS settings — certificates mounted from mqtt-tls Secret
    cafile   /mosquitto/certs/ca.crt
    certfile /mosquitto/certs/server.crt
    keyfile  /mosquitto/certs/server.key
    require_certificate true
    tls_version tlsv1.2

    # Authentication
    allow_anonymous false
    acl_file /mosquitto/config/acl

    # Persistence
    persistence true
    persistence_location /mosquitto/data/

    # Logging
    log_dest stdout
    log_type error
    log_type warning
    log_type notice
    log_type information
    log_timestamp true

    # Tuning
    max_inflight_messages 100
    max_queued_messages 1000
    message_size_limit 524288

  mqtt_acl: |
    # Omni-Sense MQTT ACL
    # Pattern: sensors publish only to their own path; gateway subscribes to all.
    user gateway
    topic readwrite omni/sensor/#

    pattern write omni/sensor/%u/#
    pattern read $SYS/#
