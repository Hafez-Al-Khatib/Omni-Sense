name: CI — Lint, Test, Model Regression, Build & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check . --output-format=github --ignore E501,E402

  # ─── EEP (FastAPI orchestrator) ────────────────────────────────────────────
  test-eep:
    name: Test EEP
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install -r eep/requirements.txt
          pip install pytest pytest-asyncio httpx
      - run: cd eep && python -m pytest tests/ -v --tb=short

  # IEP1 test job REMOVED — IEP1 (YAMNet microservice) has been eliminated.
  # DSP features are now extracted natively inside EEP via omni/eep/features.py.
  # See architectural decision: IEP1 produced 208-d airborne embeddings
  # incompatible with the 39-d structure-borne physics feature space.

  # ─── IEP2 (XGBoost + RF + OOD) ────────────────────────────────────────────
  test-iep2:
    name: Test IEP2
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install -r iep2/requirements.txt
          pip install pytest pytest-asyncio
      - run: cd iep2 && python -m pytest tests/ -v --tb=short

  # ─── IEP4 (CNN spectrogram + Autoencoder OOD) ─────────────────────────────
  test-iep4:
    name: Test IEP4
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install -r iep4/requirements.txt
          pip install pytest pytest-asyncio httpx
      - run: cd iep4 && python -m pytest tests/ -v --tb=short

  # ─── Omni platform (event-bus, EEP v2, MLOps, RUL, gateway) ──────────────
  test-omni:
    name: Test Omni Platform
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install numpy pynacl pydantic pytest pytest-asyncio
      - name: Verify feature extractor import
        run: |
          python -c "from omni.eep.features import extract_features, _FEATURE_DIM; import numpy as np; f=extract_features(np.random.randn(80000).astype('float32')); assert f.shape == (_FEATURE_DIM,); print('features OK')"
      - name: Run Omni test suite
        run: |
          python -m pytest omni/tests/ -v --tb=short -q
        env:
          PYTHONPATH: "."

  # ─── Model regression gate (triggered by [model] commits or label) ─────────
  model-regression:
    name: Model Regression Gate
    runs-on: ubuntu-latest
    needs: [test-eep, test-iep2, test-iep4, test-omni]
    if: |
      contains(github.event.pull_request.labels.*.name, 'model-update') ||
      contains(github.event.head_commit.message, '[model]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install -r iep2/requirements.txt
          pip install pytest pandas pyarrow
      - run: |
          cd iep2 && python -m pytest tests/test_model_regression.py -v --tb=short
        env:
          GOLDEN_DATASET_PATH: ../data/golden/golden_dataset_v1.csv

  # ─── Docker builds & push (main branch only) ───────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-eep, test-iep2, test-iep4, test-omni]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: eep
            context: ./eep
            dockerfile: Dockerfile
            image: omni-sense-eep
          - service: iep2
            context: .
            dockerfile: iep2/Dockerfile
            image: omni-sense-iep2
          - service: iep3
            context: .
            dockerfile: iep3/Dockerfile
            image: omni-sense-iep3
          - service: iep4
            context: .
            dockerfile: iep4/Dockerfile
            image: omni-sense-iep4
          - service: omni-platform
            context: .
            dockerfile: omni/Dockerfile
            image: omni-sense-platform
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Full docker-compose smoke test (main branch only) ───────────────────
  compose-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Generate self-signed TLS certs for MQTT
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -keyout certs/ca.key \
            -out certs/ca.crt -days 1 -nodes \
            -subj "/CN=omni-test-ca"
          cp certs/ca.crt certs/server.crt
          cp certs/ca.key certs/server.key
      - name: Start services
        run: |
          docker compose up -d eep iep2 iep3 iep4
          sleep 20
      - name: Smoke test EEP health
        run: |
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('healthy', 'ok'), f'unexpected: {d}'
          assert d.get('service') == 'eep', f'wrong service: {d}'
          print('EEP health OK')
          "
      - name: Smoke test IEP2 health
        run: |
          curl -sf http://localhost:8002/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('healthy', 'ok'), f'unexpected: {d}'
          print('IEP2 health OK')
          "
      - name: Smoke test IEP3 health
        run: |
          curl -sf http://localhost:8003/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('healthy', 'ok'), f'unexpected: {d}'
          print('IEP3 health OK')
          "
      - name: Smoke test IEP4 health
        run: |
          curl -sf http://localhost:8004/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('healthy', 'ok'), f'unexpected: {d}'
          print('IEP4 health OK')
          "
      - name: Stop services
        if: always()
        run: docker compose down
