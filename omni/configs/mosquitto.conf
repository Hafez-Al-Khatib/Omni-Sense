# Mosquitto broker — Omni-Sense production config
# Deployed via docker-compose alongside the platform services.

# ── Listeners ──────────────────────────────────────────────────────────────
# Plain MQTT disabled entirely — all traffic must use TLS
listener 8883
protocol mqtt

# ── mTLS ───────────────────────────────────────────────────────────────────
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
require_certificate true          # reject sensors without valid client cert
use_identity_as_username true     # use cert CN as MQTT username (for ACL)
tls_version tlsv1.2

# ── Authentication & ACL ───────────────────────────────────────────────────
allow_anonymous false
# # password_file /mosquitto/config/passwd
# acl_file      /mosquitto/config/acl

# ── Persistence ────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
