# ── Omni-Sense Mosquitto Configuration ──────────────────────────────────────
# Plaintext MQTT for demo stability — TLS stripped.
# Production: re-enable 8883 with mTLS certificates.

listener 1883
allow_anonymous true

# WebSocket listener for browser dashboard
listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
