apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.iep4.name }}
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.iep4.name "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "omni-sense.selectorLabels" (dict "component" .Values.iep4.name "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.iep4.port }}
      targetPort: http
      protocol: TCP
---
# PVC for CNN model weights (shared across rolling updates via ReadWriteOnce)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iep4-models-pvc
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.iep4.name "context" .) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  {{- if .Values.timescaledb.persistence.storageClass }}
  storageClassName: {{ .Values.timescaledb.persistence.storageClass }}
  {{- end }}
