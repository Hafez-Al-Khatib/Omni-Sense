# docker-compose.prod.yml — Production overlay for Hetzner CX23
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This overlay:
#   1. Adds Caddy as a TLS-terminating reverse proxy (Let's Encrypt)
#   2. Removes host-port bindings from internal services (Caddy fronts them)
#   3. Adds memory limits suitable for a 4 GB RAM CX23 instance
#   4. Keeps MQTT 1883 exposed directly for ESP32 / RPi hardware

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env.production
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-ui:/srv/web-ui:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - omni-net
    depends_on:
      - eep
      - grafana
      - prometheus
      - mlflow
      - omni-platform
    deploy:
      resources:
        limits:
          memory: 128M

  # Disable host port bindings — Caddy is the sole entrypoint for HTTP(S)
  eep:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  iep2:
    deploy:
      resources:
        limits:
          memory: 512M

  iep3:
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  mlflow:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256M

  timescaledb:
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          memory: 128M

  mqtt-broker:
    deploy:
      resources:
        limits:
          memory: 64M

  # MQTT stays exposed on host ports for hardware integration
  # (ESP32 / RPi connect directly, not through Caddy)

volumes:
  caddy_data:
  caddy_config:
