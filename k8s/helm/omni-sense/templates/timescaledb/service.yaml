apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.timescaledb.name }}
  namespace: {{ include "omni-sense.namespace" . }}
  labels:
    {{- include "omni-sense.componentLabels" (dict "component" .Values.timescaledb.name "context" .) | nindent 4 }}
spec:
  # Headless service for StatefulSet stable DNS
  clusterIP: None
  selector:
    {{- include "omni-sense.selectorLabels" (dict "component" .Values.timescaledb.name "context" .) | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.timescaledb.port }}
      targetPort: postgres
      protocol: TCP
