apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-sense-eep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omni-sense-eep
  template:
    metadata:
      labels:
        app: omni-sense-eep
    spec:
      containers:
        - name: eep
          image: "maramshatila/omni-sense-eep:v1"
          ports:
            - containerPort: 8000